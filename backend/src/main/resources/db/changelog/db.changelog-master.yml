databaseChangeLog:
  - changeSet:
      id: 001-enable-pgcrypto
      author: taskflow
      changes:
        - sql:
            sql: CREATE EXTENSION IF NOT EXISTS pgcrypto;
      rollback:
        - sql:
            sql: SELECT 1;

  - changeSet:
      id: 002-create-users
      author: taskflow
      changes:
        - createTable:
            tableName: users
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: email
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: password
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamp with time zone
                  defaultValueComputed: NOW()
                  constraints:
                    nullable: false
        - addUniqueConstraint:
            tableName: users
            columnNames: email
            constraintName: uq_users_email
      rollback:
        - dropTable:
            tableName: users

  - changeSet:
      id: 003-create-projects
      author: taskflow
      changes:
        - createTable:
            tableName: projects
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: text
              - column:
                  name: owner_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamp with time zone
                  defaultValueComputed: NOW()
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: projects
            baseColumnNames: owner_id
            constraintName: fk_projects_owner
            referencedTableName: users
            referencedColumnNames: id
            onDelete: CASCADE
        - createIndex:
            tableName: projects
            indexName: idx_projects_owner_id
            columns:
              - column:
                  name: owner_id
      rollback:
        - dropTable:
            tableName: projects

  - changeSet:
      id: 004-create-tasks
      author: taskflow
      changes:
        - createTable:
            tableName: tasks
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: title
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: text
              - column:
                  name: status
                  type: varchar(30)
                  constraints:
                    nullable: false
              - column:
                  name: priority
                  type: varchar(30)
                  constraints:
                    nullable: false
              - column:
                  name: project_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: assignee_id
                  type: uuid
              - column:
                  name: created_by
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: due_date
                  type: date
              - column:
                  name: created_at
                  type: timestamp with time zone
                  defaultValueComputed: NOW()
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamp with time zone
                  defaultValueComputed: NOW()
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: tasks
            baseColumnNames: project_id
            constraintName: fk_tasks_project
            referencedTableName: projects
            referencedColumnNames: id
            onDelete: CASCADE
        - addForeignKeyConstraint:
            baseTableName: tasks
            baseColumnNames: assignee_id
            constraintName: fk_tasks_assignee
            referencedTableName: users
            referencedColumnNames: id
            onDelete: SET NULL
        - addForeignKeyConstraint:
            baseTableName: tasks
            baseColumnNames: created_by
            constraintName: fk_tasks_created_by
            referencedTableName: users
            referencedColumnNames: id
            onDelete: CASCADE
        - createIndex:
            tableName: tasks
            indexName: idx_tasks_project_id
            columns:
              - column:
                  name: project_id
        - createIndex:
            tableName: tasks
            indexName: idx_tasks_assignee_id
            columns:
              - column:
                  name: assignee_id
        - createIndex:
            tableName: tasks
            indexName: idx_tasks_status
            columns:
              - column:
                  name: status
      rollback:
        - dropTable:
            tableName: tasks

  - changeSet:
      id: 005-seed-data
      author: taskflow
      changes:
        - sqlFile:
            path: db/changelog/seed.sql
            relativeToChangelogFile: false
      rollback:
        - sql:
            sql: |
              DELETE FROM tasks WHERE id IN (
                '33333333-3333-3333-3333-333333333331',
                '33333333-3333-3333-3333-333333333332',
                '33333333-3333-3333-3333-333333333333'
              );
              DELETE FROM projects WHERE id = '22222222-2222-2222-2222-222222222222';
              DELETE FROM users WHERE id = '11111111-1111-1111-1111-111111111111';
